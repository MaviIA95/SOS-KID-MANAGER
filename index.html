<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>SOS Kid Manager Pro</title>
  <meta name="theme-color" content="#dc2626">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192x192.png">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      min-height: 100vh;
      padding: 15px;
      color: #333;
      max-width: 600px;
      margin: 0 auto;
    }
    .header {
      background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
      color: white;
      padding: 20px;
      border-radius: 16px;
      text-align: center;
      margin-bottom: 20px;
    }
    .mode-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .mode-btn {
      flex: 1;
      padding: 15px;
      border: 2px solid #dc2626;
      background: white;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1rem;
    }
    .mode-btn.active {
      background: #dc2626;
      color: white;
    }
    .tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 20px;
      background: white;
      padding: 5px;
      border-radius: 10px;
    }
    .tab {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    .tab.active {
      background: #dc2626;
      color: white;
    }
    .content { display: none; }
    .content.active { display: block; }
    
    .sos-button {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, #dc2626 0%, #991b1b 100%);
      color: white;
      border: 8px solid #fca5a5;
      font-size: 2rem;
      font-weight: bold;
      cursor: pointer;
      margin: 30px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .sos-button.counting {
      animation: pulse 1s infinite;
      background: radial-gradient(circle, #fbbf24 0%, #f59e0b 100%);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .countdown { font-size: 4rem; font-weight: bold; color: #dc2626; text-align: center; margin: 20px 0; }
    
    .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; }
    .card h3 { color: #1e293b; margin-bottom: 15px; }
    
    .contact-item {
      padding: 12px;
      background: #f8fafc;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .btn-sm { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; margin-left: 5px; }
    .btn-delete { background: #fee2e2; color: #991b1b; }
    
    .status { padding: 12px; margin: 15px 0; border-radius: 8px; text-align: center; display: none; }
    .status.success { background: #d1fae5; color: #065f46; display: block; }
    .status.error { background: #fee2e2; color: #991b1b; display: block; }
    
    .reset-btn {
      width: 100%;
      padding: 15px;
      background: #94a3b8;
      color: white;
      border: none;
      border-radius: 8px;
      margin-top: 30px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚨 SOS Kid Manager Pro</h1>
    <p style="opacity: 0.9;">Application d'urgence pour enfants</p>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" onclick="switchMode('enfant')">👶 Mode Enfant</button>
    <button class="mode-btn" onclick="checkPin('parent')">‍👩‍👧 Mode Parent</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('sos')">🚨 SOS</button>
    <button class="tab" onclick="checkPin('contacts')">📞 Contacts</button>
    <button class="tab" onclick="checkPin('history')">📋 Historique</button>
    <button class="tab" onclick="checkPin('settings')">⚙️ Réglages</button>
  </div>

  <!-- SOS -->
  <div class="content active" id="sos">
    <div class="card" style="text-align: center;">
      <h2 style="color: #dc2626; margin-bottom: 10px;">Bouton d'Urgence</h2>
      <p style="color: #64748b; margin-bottom: 20px;">Maintenez 3 secondes</p>
      
      <button class="sos-button" id="sosBtn" onmousedown="startSOS()" onmouseup="cancelSOS()" ontouchstart="startSOS()" ontouchend="cancelSOS()">
        <div style="font-size: 4rem;">🚨</div>
        <div>SOS</div>
      </button>
      
      <div class="countdown" id="countdown"></div>
      <div class="status" id="status"></div>
      
      <button class="reset-btn" onclick="hardReset()">🔧 Réinitialiser l'application (PIN oublié)</button>
    </div>
  </div>

  <!-- CONTACTS -->
  <div class="content" id="contacts">
    <div class="card">
      <h3>📞 Contacts d'urgence</h3>
      <div id="contactsList"></div>
      <div style="margin-top: 15px;">
        <input type="text" id="newName" placeholder="Nom" style="width: 48%; padding: 10px; margin-right: 2%;">
        <input type="tel" id="newPhone" placeholder="Tél" style="width: 48%; padding: 10px;">
        <button onclick="addContact()" style="width: 100%; margin-top: 10px; padding: 12px; background: #dc2626; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">+ Ajouter contact</button>
      </div>
    </div>
  </div>

  <!-- HISTORIQUE -->
  <div class="content" id="history">
    <div class="card">
      <h3> Historique</h3>
      <div id="historyList"></div>
    </div>
  </div>

  <!-- RÉGLAGES -->
  <div class="content" id="settings">
    <div class="card">
      <h3>🔐 Changer le PIN</h3>
      <button onclick="changePin()" style="width: 100%; padding: 12px; background: #dc2626; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Modifier le code PIN</button>
    </div>
  </div>

  <script>
    // === PIN SIMPLE ET EFFICACE ===
    let currentPin = localStorage.getItem('sos_pin') || '2026';
    let contacts = JSON.parse(localStorage.getItem('sos_contacts')) || [];
    let historyData = JSON.parse(localStorage.getItem('sos_history')) || [];
    let countdownTimer;

    // Fonction de vérification PIN - SIMPLE ET INFAILLIBLE
    function checkPin(action) {
      const input = prompt("🔐 Code PIN requis (défaut: 2026):");
      
      if (input === null) {
        return; // Annulé
      }
      
      if (input === currentPin) {
        // PIN correct
        if (action === 'parent') {
          switchMode('parent');
        } else if (action === 'contacts') {
          showTab('contacts');
          renderContacts();
        } else if (action === 'history') {
          showTab('history');
          renderHistory();
        } else if (action === 'settings') {
          showTab('settings');
        }
      } else {
        alert("❌ Code incorrect ! Le code par défaut est 2026");
      }
    }

    function switchMode(mode) {
      const btns = document.querySelectorAll('.mode-btn');
      if (mode === 'enfant') {
        btns[0].classList.add('active');
        btns[1].classList.remove('active');
        document.querySelectorAll('.tab')[1].style.display = 'none';
        document.querySelectorAll('.tab')[2].style.display = 'none';
        document.querySelectorAll('.tab')[3].style.display = 'none';
        showTab('sos');
      } else {
        btns[1].classList.add('active');
        btns[0].classList.remove('active');
        document.querySelectorAll('.tab')[1].style.display = 'block';
        document.querySelectorAll('.tab')[2].style.display = 'block';
        document.querySelectorAll('.tab')[3].style.display = 'block';
      }
    }

    function showTab(tabName) {
      document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }

    // SOS
    function startSOS() {
      const btn = document.getElementById('sosBtn');
      const countdown = document.getElementById('countdown');
      let count = 3;
      
      btn.classList.add('counting');
      countdown.textContent = count;
      
      countdownTimer = setInterval(() => {
        count--;
        if (count > 0) {
          countdown.textContent = count;
        } else {
          clearInterval(countdownTimer);
          sendAlert();
        }
      }, 1000);
    }

    function cancelSOS() {
      const btn = document.getElementById('sosBtn');
      const countdown = document.getElementById('countdown');
      
      btn.classList.remove('counting');
      countdown.textContent = '';
      clearInterval(countdownTimer);
    }

    async function sendAlert() {
      cancelSOS();
      showStatus('📍 Localisation...', 'error');
      
      try {
        const pos = await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, {timeout: 10000});
        });
        
        const link = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
        const msg = ` SOS ENFANT\nPosition: ${link}`;
        
        if (contacts.length === 0) {
          showStatus('️ Aucun contact configuré !', 'error');
          return;
        }
        
        for (let c of contacts) {
          if (c.type === 'appel' || c.type === 'les2') {
            window.location.href = `tel:${c.phone}`;
          }
          if (c.type === 'sms' || c.type === 'les2') {
            window.open(`sms:${c.phone}?body=${encodeURIComponent(msg)}`, '_blank');
          }
        }
        
        historyData.unshift({date: new Date().toISOString(), pos: link});
        localStorage.setItem('sos_history', JSON.stringify(historyData));
        showStatus('✅ Alertes envoyées !', 'success');
      } catch (e) {
        showStatus('❌ Erreur GPS', 'error');
      }
    }

    function showStatus(msg, type) {
      const s = document.getElementById('status');
      s.textContent = msg;
      s.className = `status ${type}`;
      setTimeout(() => s.style.display = 'none', 5000);
    }

    // Contacts
    function addContact() {
      const name = document.getElementById('newName').value;
      const phone = document.getElementById('newPhone').value;
      const type = prompt("Type d'alerte?\n1 = Appel\n2 = SMS\n3 = Les deux", "3");
      
      if (!name || !phone) return alert('Remplissez tout !');
      
      let typeStr = 'les2';
      if (type === '1') typeStr = 'appel';
      if (type === '2') typeStr = 'sms';
      
      contacts.push({name, phone, type: typeStr});
      localStorage.setItem('sos_contacts', JSON.stringify(contacts));
      document.getElementById('newName').value = '';
      document.getElementById('newPhone').value = '';
      renderContacts();
    }

    function renderContacts() {
      const div = document.getElementById('contactsList');
      if (contacts.length === 0) {
        div.innerHTML = '<p style="text-align:center;color:#94a3b8;">Aucun contact</p>';
        return;
      }
      div.innerHTML = contacts.map((c, i) => `
        <div class="contact-item">
          <div><strong>${c.name}</strong><br><small>${c.phone} (${c.type})</small></div>
          <button class="btn-sm btn-delete" onclick="delContact(${i})">🗑️</button>
        </div>
      `).join('');
    }

    function delContact(i) {
      if (confirm('Supprimer ?')) {
        contacts.splice(i, 1);
        localStorage.setItem('sos_contacts', JSON.stringify(contacts));
        renderContacts();
      }
    }

    function renderHistory() {
      const div = document.getElementById('historyList');
      if (historyData.length === 0) {
        div.innerHTML = '<p style="text-align:center;color:#94a3b8;">Aucune alerte</p>';
        return;
      }
      div.innerHTML = historyData.map(h => `
        <div class="contact-item">
          <div>${new Date(h.date).toLocaleString('fr-FR')}</div>
          <a href="${h.pos}" target="_blank" style="color:#dc2626;">📍 Voir</a>
        </div>
      `).join('');
    }

    // Réinitialisation
    function changePin() {
      const newPin = prompt("Nouveau code PIN (4 chiffres):");
      if (newPin && newPin.length === 4) {
        currentPin = newPin;
        localStorage.setItem('sos_pin', newPin);
        alert("✅ PIN changé !");
      }
    }

    function hardReset() {
      if (confirm("⚠️ TOUT effacer et remettre PIN à 2026 ?")) {
        localStorage.clear();
        localStorage.setItem('sos_pin', '2026');
        alert("✅ Réinitialisé !");
        location.reload();
      }
    }

    // Init
    switchMode('enfant');
  </script>
</body>
</html>
